<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>QORE Login</title>

  <link
    rel="stylesheet"
    href="./css/style.css"
  />

  <link
    rel="stylesheet"
    href="./css/auth.css"
  />

</head>

<body>

  <!-- GLOW -->
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>

  <section class="auth-page">

    <!-- LEFT -->

    <div class="auth-left">

      <div>

        <p class="auth-tag">
          one-more-question
        </p>

        <h1>
          Welcome Back To QORE
        </h1>

        <p class="auth-description">
          Continue your grind.
          Track progress.
          Dominate rankings.
        </p>

      </div>

    </div>

    <!-- RIGHT -->

    <div class="auth-right">

      <form
        id="login-form"
        class="auth-card glass-card"
      >

        <h2>
          Login
        </h2>

        <!-- EMAIL -->

        <div class="input-group">

          <label for="login-email">
            Email
          </label>

          <input
            id="login-email"
            type="email"
            placeholder="Enter your email"
            required
          />

        </div>

        <!-- PASSWORD -->

        <div class="input-group">

          <label for="login-password">
            Password
          </label>

          <input
            id="login-password"
            type="password"
            placeholder="Enter your password"
            required
          />

        </div>

        <!-- BUTTON -->

        <button
          type="submit"
          class="primary-btn auth-btn"
        >
          Login
        </button>

        <!-- SWITCH -->

        <p class="auth-switch">

          Don’t have an account?

          <a href="./signup.html">
            Sign Up
          </a>

        </p>

      </form>

    </div>

  </section>

  <script src="./js/app.js"></script>
  <script src="./js/auth.js"></script>

</body>

</html>
